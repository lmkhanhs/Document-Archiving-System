version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: dms-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: datn
      MYSQL_ROOT_PASSWORD: 123456
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dms-network

  redis:
    image: redis:alpine
    container_name: dms-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dms-network

  backend:
    build:
      context: ./backend/dms
      dockerfile: Dockerfile
    container_name: dms-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/datn?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      # Override upload directory to a persistent path in container
      - APP_STORAGE_UPLOAD_DIR=/app/uploads
      # Connects to AI server running on the EC2 host port 8000
      - APP_AI_BASE_URL=http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/app/uploads
    networks:
      - dms-network

volumes:
  mysql_data:
  redis_data:

networks:
  dms-network:
    driver: bridge
