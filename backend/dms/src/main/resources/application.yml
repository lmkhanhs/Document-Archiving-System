spring:
  application:
    name: dms
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1/datn}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  prefix: /api/v1
  ai:
    base-url: ${APP_AI_BASE_URL:http://localhost:8000}
  storage:
    upload-dir: ${APP_STORAGE_UPLOAD_DIR:uploads}
  google:
    client-id: 876249634423-2gt9o8issf4osnn537tm56dr8lfht4t3.apps.googleusercontent.com
  security:
